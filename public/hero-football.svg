<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" width="600" height="375" role="img" aria-label="Football match broadcast frame">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16335f"/>
      <stop offset="1" stop-color="#27508f"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fa757"/>
      <stop offset="1" stop-color="#2c7a3f"/>
    </linearGradient>
    <pattern id="crowd" width="16" height="11" patternUnits="userSpaceOnUse">
      <rect width="16" height="11" fill="#1c3357"/>
      <circle cx="4" cy="4" r="2.1" fill="#33507e"/>
      <circle cx="12" cy="8" r="2.1" fill="#3c5d8f"/>
      <circle cx="9" cy="3" r="1.6" fill="#28456e"/>
    </pattern>
  </defs>

  <!-- stands -->
  <rect width="600" height="120" fill="url(#sky)"/>
  <rect width="600" height="120" fill="url(#crowd)" opacity="0.9"/>
  <rect y="114" width="600" height="8" fill="#0d2240"/>

  <!-- pitch -->
  <rect y="120" width="600" height="255" fill="url(#grass)"/>
  <!-- mowed stripes -->
  <g opacity="0.10">
    <rect y="120" width="600" height="32" fill="#0b3d1c"/>
    <rect y="184" width="600" height="32" fill="#0b3d1c"/>
    <rect y="248" width="600" height="32" fill="#0b3d1c"/>
    <rect y="312" width="600" height="32" fill="#0b3d1c"/>
  </g>

  <!-- field markings -->
  <g fill="none" stroke="#ffffff" stroke-width="3" opacity="0.92">
    <rect x="20" y="140" width="560" height="215"/>
    <line x1="20" y1="247" x2="580" y2="247"/>
    <circle cx="300" cy="247" r="46"/>
    <rect x="20" y="200" width="70" height="95"/>
    <rect x="510" y="200" width="70" height="95"/>
    <rect x="20" y="222" width="30" height="50"/>
    <rect x="550" y="222" width="30" height="50"/>
  </g>
  <circle cx="300" cy="247" r="3.5" fill="#ffffff"/>

  <!-- players -->
  <g>
    <!-- left team (white) -->
    <g fill="#f4f6fb">
      <circle cx="150" cy="200" r="12"/>
      <rect x="139" y="212" width="22" height="40" rx="10"/>
    </g>
    <g fill="#f4f6fb">
      <circle cx="225" cy="270" r="12"/>
      <rect x="214" y="282" width="22" height="40" rx="10"/>
    </g>
    <!-- right team (red) -->
    <g fill="#d8413f">
      <circle cx="380" cy="205" r="12"/>
      <rect x="369" y="217" width="22" height="40" rx="10"/>
    </g>
    <g fill="#d8413f">
      <circle cx="455" cy="265" r="12"/>
      <rect x="444" y="277" width="22" height="40" rx="10"/>
    </g>
    <!-- goalkeeper (yellow) -->
    <g fill="#f2c14e">
      <circle cx="60" cy="240" r="12"/>
      <rect x="49" y="252" width="22" height="42" rx="10"/>
    </g>
  </g>

  <!-- ball -->
  <g>
    <circle cx="300" cy="300" r="11" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M300 292 l6 4 -2 7 -8 0 -2 -7 z" fill="#1a1a1a"/>
  </g>

  <!-- broadcast bug -->
  <g opacity="0.9">
    <rect x="500" y="18" width="78" height="22" rx="4" fill="#6C47FF"/>
    <text x="539" y="33" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">LIVE</text>
  </g>
</svg>
